version: "3.9"

services:
  api:
    build: .
    container_name: sentinelflow_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - sentinel_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  simulator:
    build: .
    container_name: sentinelflow_simulator
    restart: unless-stopped
    command: ["python", "simulator.py"]
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy

  dashboard:
    build: .
    container_name: sentinelflow_dashboard
    restart: unless-stopped
    command: ["streamlit", "run", "dashboard.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy

volumes:
  sentinel_data:
